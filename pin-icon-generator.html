<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pin Icon Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap');

  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #22222a;
    --border: #2e2e3a;
    --accent: #f5c842;
    --accent2: #ff6b6b;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .app {
    display: flex;
    flex: 1;
    gap: 0;
  }

  /* LEFT PANEL */
  .panel {
    width: 340px;
    min-width: 300px;
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .section-title {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  label {
    font-size: 0.72rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  label span.val {
    color: var(--accent);
    font-size: 0.72rem;
  }

  input[type=range] {
    width: 100%;
    height: 3px;
    appearance: none;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    margin-top: 4px;
  }

  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 0 3px rgba(245,200,66,0.15);
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type=color] {
    width: 36px;
    height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    padding: 0;
    flex-shrink: 0;
  }

  .color-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    flex: 1;
  }

  input[type=checkbox] {
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    background: var(--surface);
  }

  .upload-zone:hover, .upload-zone.drag {
    border-color: var(--accent);
    background: rgba(245,200,66,0.04);
  }

  .upload-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-zone .up-icon {
    font-size: 1.6rem;
    margin-bottom: 6px;
    display: block;
  }

  .upload-zone p {
    font-size: 0.68rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .upload-zone .filename {
    color: var(--accent);
    margin-top: 6px;
    font-size: 0.7rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Shape presets */
  .presets {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .preset-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover, .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,200,66,0.06);
  }

  /* Select */
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 6px 10px;
    cursor: pointer;
    outline: none;
    width: 100%;
    appearance: none;
  }

  /* Download btn */
  .dl-btn {
    width: 100%;
    background: var(--accent);
    color: #0e0e10;
    border: none;
    border-radius: var(--radius);
    padding: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: auto;
  }

  .dl-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .dl-btn:active { transform: translateY(0); }

  /* PREVIEW */
  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 40px;
    background:
      radial-gradient(circle at 20% 20%, rgba(245,200,66,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(255,107,107,0.03) 0%, transparent 50%);
    position: relative;
  }

  .preview-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    position: absolute;
    top: 20px;
    left: 24px;
  }

  .preview-bg-toggle {
    position: absolute;
    top: 16px;
    right: 24px;
    display: flex;
    gap: 6px;
  }

  .bg-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .bg-btn.active { border-color: var(--accent); }
  .bg-btn.dark { background: #111; }
  .bg-btn.light { background: #f0f0f0; }
  .bg-btn.checker {
    background-image:
      linear-gradient(45deg, #888 25%, transparent 25%),
      linear-gradient(-45deg, #888 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #888 75%),
      linear-gradient(-45deg, transparent 75%, #888 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0px;
  }

  #preview-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    padding: 40px;
    transition: background 0.3s;
  }

  #preview-canvas {
    display: block;
    /* canvas itself */
  }

  .size-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .size-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 0.65rem;
    color: var(--text-muted);
  }

  .size-badge.active-size {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .toggle {
    width: 34px; height: 18px;
    border-radius: 9px;
    background: var(--border);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on { background: var(--accent); }

  .toggle::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: white;
    top: 3px; left: 3px;
    transition: left 0.2s;
  }

  .toggle.on::after { left: 19px; }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .num-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    padding: 5px 8px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .num-input:focus { border-color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

</style>
</head>
<body>

<header>
  <h1>Pin Icon Generator</h1>
  <span>水滴地图图标生成器</span>
</header>

<div class="app">
  <!-- LEFT CONTROLS -->
  <div class="panel">

    <!-- Shape -->
    <div class="section">
      <div class="section-title">Shape / 形状</div>
      <div class="presets" id="shapePresets">
        <button class="preset-btn active" data-shape="teardrop">水滴</button>
        <button class="preset-btn" data-shape="circle">圆形</button>
        <button class="preset-btn" data-shape="rounded">圆角方</button>
        <button class="preset-btn" data-shape="shield">盾牌</button>
        <button class="preset-btn" data-shape="balloon">气泡</button>
      </div>
    </div>

    <!-- Image Upload -->
    <div class="section">
      <div class="section-title">Inner Image / 内部图像</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="imgInput" accept="image/*">
        <span class="up-icon">⬆</span>
        <p>拖拽或点击上传图像<br>支持 PNG / JPG / SVG / WebP</p>
        <div class="filename" id="filename"></div>
      </div>
      <div>
        <label>图像缩放 <span class="val" id="imgScaleVal">80%</span></label>
        <input type="range" id="imgScale" min="20" max="100" value="80">
      </div>
      <div>
        <label>图像垂直偏移 <span class="val" id="imgOffsetVal">0px</span></label>
        <input type="range" id="imgOffset" min="-40" max="40" value="0">
      </div>
    </div>

    <!-- Colors -->
    <div class="section">
      <div class="section-title">Colors / 颜色</div>
      <div class="color-row">
        <input type="color" id="pinColor" value="#e74c3c">
        <span class="color-label">Pin 填充色</span>
      </div>
      <div class="color-row">
        <input type="color" id="pin2Color" value="#c0392b">
        <span class="color-label">渐变辅助色</span>
      </div>
      <div class="toggle-row">
        <span>启用渐变</span>
        <div class="toggle on" id="gradToggle"></div>
      </div>
      <div class="color-row">
        <input type="color" id="strokeColor" value="#ffffff">
        <span class="color-label">边框颜色</span>
      </div>
      <div>
        <label>边框宽度 <span class="val" id="strokeWidthVal">3px</span></label>
        <input type="range" id="strokeWidth" min="0" max="20" value="3">
      </div>
      <div class="toggle-row">
        <span>内圆 / 图像区域背景</span>
        <div class="toggle on" id="innerBgToggle"></div>
      </div>
      <div class="color-row">
        <input type="color" id="innerBgColor" value="#ffffff">
        <span class="color-label">图像区背景色</span>
      </div>
    </div>

    <!-- Shadow -->
    <div class="section">
      <div class="section-title">Shadow / 阴影</div>
      <div class="toggle-row">
        <span>启用阴影</span>
        <div class="toggle on" id="shadowToggle"></div>
      </div>
      <div>
        <label>阴影模糊 <span class="val" id="shadowBlurVal">16px</span></label>
        <input type="range" id="shadowBlur" min="0" max="60" value="16">
      </div>
      <div>
        <label>阴影偏移Y <span class="val" id="shadowOffsetVal">6px</span></label>
        <input type="range" id="shadowOffset" min="0" max="30" value="6">
      </div>
      <div>
        <label>阴影透明度 <span class="val" id="shadowAlphaVal">50%</span></label>
        <input type="range" id="shadowAlpha" min="0" max="100" value="50">
      </div>
      <div class="color-row">
        <input type="color" id="shadowColor" value="#000000">
        <span class="color-label">阴影颜色</span>
      </div>
    </div>

    <!-- Size -->
    <div class="section">
      <div class="section-title">Export Size / 导出尺寸</div>
      <div class="row2">
        <div class="input-group">
          <label>宽度(px)</label>
          <input class="num-input" type="number" id="exportW" value="128" min="32" max="1024">
        </div>
        <div class="input-group">
          <label>高度(px)</label>
          <input class="num-input" type="number" id="exportH" value="160" min="32" max="1024">
        </div>
      </div>
      <div class="size-badges" id="sizeBadges">
        <div class="size-badge active-size" data-w="64" data-h="80">64×80</div>
        <div class="size-badge active-size" data-w="128" data-h="160">128×160</div>
        <div class="size-badge" data-w="256" data-h="320">256×320</div>
        <div class="size-badge" data-w="512" data-h="640">512×640</div>
      </div>
    </div>

    <button class="dl-btn" id="dlBtn">⬇ 下载 PNG（含透明通道）</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview-area">
    <span class="preview-label">Preview / 预览</span>
    <div class="preview-bg-toggle">
      <div class="bg-btn dark active" data-bg="dark" title="深色背景"></div>
      <div class="bg-btn light" data-bg="light" title="浅色背景"></div>
      <div class="bg-btn checker" data-bg="checker" title="透明棋盘"></div>
    </div>
    <div id="preview-wrap">
      <canvas id="preview-canvas" width="200" height="250"></canvas>
    </div>
    <div id="dimInfo" style="font-size:0.65rem;color:var(--text-muted)">预览: 200×250</div>
  </div>
</div>

<script>
// ========== STATE ==========
const state = {
  shape: 'teardrop',
  userImage: null,
  imgScale: 80,
  imgOffset: 0,
  pinColor: '#e74c3c',
  pin2Color: '#c0392b',
  gradEnabled: true,
  strokeColor: '#ffffff',
  strokeWidth: 3,
  innerBgEnabled: true,
  innerBgColor: '#ffffff',
  shadowEnabled: true,
  shadowBlur: 16,
  shadowOffset: 6,
  shadowAlpha: 50,
  shadowColor: '#000000',
  exportW: 128,
  exportH: 160,
};

// ========== SHAPE PATHS (normalized 0..1 viewBox) ==========
const SHAPES = {
  teardrop: (w, h) => {
    // Classic map pin: teardrop, tip at bottom center
    const cx = w / 2, bodyH = h * 0.72, r = w * 0.46;
    const tipY = h * 0.96;
    return buildTeardropPath(cx, r, bodyH, tipY, h);
  },
  circle: (w, h) => {
    const cx = w/2, cy = h*0.4, r = w*0.42;
    return `M ${cx-r} ${cy} A ${r} ${r} 0 1 1 ${cx+r} ${cy} A ${r} ${r} 0 1 1 ${cx-r} ${cy} Z`;
  },
  rounded: (w, h) => {
    const m = w*0.08, r2 = w*0.18;
    const x1=m, y1=h*0.06, x2=w-m, y2=h*0.76;
    return `M ${x1+r2} ${y1} L ${x2-r2} ${y1} Q ${x2} ${y1} ${x2} ${y1+r2} L ${x2} ${y2-r2} Q ${x2} ${y2} ${x2-r2} ${y2} L ${w/2+w*0.04} ${y2} L ${w/2} ${h*0.96} L ${w/2-w*0.04} ${y2} L ${x1+r2} ${y2} Q ${x1} ${y2} ${x1} ${y2-r2} L ${x1} ${y1+r2} Q ${x1} ${y1} ${x1+r2} ${y1} Z`;
  },
  shield: (w, h) => {
    const cx=w/2, t=h*0.06, m=w*0.08;
    return `M ${cx} ${t} L ${w-m} ${t+h*0.1} L ${w-m} ${h*0.55} Q ${w-m} ${h*0.75} ${cx} ${h*0.95} Q ${m} ${h*0.75} ${m} ${h*0.55} L ${m} ${t+h*0.1} Z`;
  },
  balloon: (w, h) => {
    const cx=w/2, cy=h*0.38, r=w*0.44;
    const tailW=w*0.07, tipY=h*0.96;
    return `M ${cx-r} ${cy} A ${r} ${r} 0 1 1 ${cx+r} ${cy} A ${r} ${r} 0 0 1 ${cx+tailW} ${cy+r*0.3} L ${cx} ${tipY} L ${cx-tailW} ${cy+r*0.3} A ${r} ${r} 0 0 1 ${cx-r} ${cy} Z`;
  }
};

function buildTeardropPath(cx, r, bodyH, tipY, h) {
  // top arc center at (cx, r+h*0.04)
  const topCY = r + h * 0.04;
  return `M ${cx} ${tipY} C ${cx - r*0.3} ${tipY - h*0.12} ${cx - r} ${topCY + r*0.5} ${cx - r} ${topCY} A ${r} ${r} 0 1 1 ${cx + r} ${topCY} C ${cx + r} ${topCY + r*0.5} ${cx + r*0.3} ${tipY - h*0.12} ${cx} ${tipY} Z`;
}

// ========== RENDER ==========
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawPin(canvas, w, h, forExport=false) {
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, w, h);

  const pathStr = SHAPES[state.shape](w, h);
  const path = new Path2D(pathStr);

  // shadow
  if (state.shadowEnabled && !forExport) {
    ctx.save();
    const sc = hexToRgb(state.shadowColor);
    ctx.shadowColor = `rgba(${sc.r},${sc.g},${sc.b},${state.shadowAlpha/100})`;
    ctx.shadowBlur = state.shadowBlur * (w/128);
    ctx.shadowOffsetY = state.shadowOffset * (w/128);
    ctx.fillStyle = 'rgba(0,0,0,0.001)';
    ctx.fill(path);
    ctx.restore();
  }

  // For export with shadow: draw to offscreen first then composite
  if (state.shadowEnabled && forExport) {
    // Draw shadow pass
    ctx.save();
    const sc = hexToRgb(state.shadowColor);
    ctx.shadowColor = `rgba(${sc.r},${sc.g},${sc.b},${state.shadowAlpha/100})`;
    ctx.shadowBlur = state.shadowBlur * (w/128);
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = state.shadowOffset * (w/128);
    ctx.fillStyle = state.pinColor;
    ctx.fill(path);
    ctx.restore();
  }

  // gradient or solid fill
  let fillStyle;
  if (state.gradEnabled) {
    const grd = ctx.createLinearGradient(0, 0, w * 0.3, h * 0.9);
    grd.addColorStop(0, state.pinColor);
    grd.addColorStop(1, state.pin2Color);
    fillStyle = grd;
  } else {
    fillStyle = state.pinColor;
  }

  ctx.save();
  ctx.fillStyle = fillStyle;
  ctx.fill(path);
  ctx.restore();

  // stroke
  if (state.strokeWidth > 0) {
    ctx.save();
    ctx.strokeStyle = state.strokeColor;
    ctx.lineWidth = state.strokeWidth * (w/128);
    ctx.lineJoin = 'round';
    ctx.stroke(path);
    ctx.restore();
  }

  // clip inner circle for image
  const innerR = getInnerCircle(w, h);
  const icx = innerR.cx, icy = innerR.cy, ir = innerR.r;

  if (state.innerBgEnabled) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(icx, icy, ir, 0, Math.PI*2);
    ctx.clip();
    ctx.fillStyle = state.innerBgColor;
    ctx.fill();
    ctx.restore();
  }

  // draw user image inside circle
  if (state.userImage) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(icx, icy, ir * 0.97, 0, Math.PI*2);
    ctx.clip();

    const scale = state.imgScale / 100;
    const iw = ir * 2 * scale;
    const ih = ir * 2 * scale;
    const ix = icx - iw/2;
    const iy = icy - ih/2 + state.imgOffset * (w/128);
    ctx.drawImage(state.userImage, ix, iy, iw, ih);
    ctx.restore();
  }
}

function getInnerCircle(w, h) {
  // different shapes have different center/radius for inner image area
  switch(state.shape) {
    case 'teardrop': {
      const r = w*0.46;
      const topCY = r + h*0.04;
      return { cx: w/2, cy: topCY, r: r * 0.65 };
    }
    case 'circle': return { cx: w/2, cy: h*0.4, r: w*0.32 };
    case 'rounded': return { cx: w/2, cy: h*0.41, r: w*0.28 };
    case 'shield': return { cx: w/2, cy: h*0.38, r: w*0.28 };
    case 'balloon': return { cx: w/2, cy: h*0.38, r: w*0.33 };
    default: return { cx: w/2, cy: h*0.4, r: w*0.3 };
  }
}

// ========== PREVIEW ==========
const previewCanvas = document.getElementById('preview-canvas');
const PREVIEW_W = 200, PREVIEW_H = 250;

function updatePreview() {
  drawPin(previewCanvas, PREVIEW_W, PREVIEW_H, false);
}

// ========== CONTROLS WIRING ==========
function bindRange(id, key, valId, suffix='px', factor=1) {
  const el = document.getElementById(id);
  const valEl = document.getElementById(valId);
  el.addEventListener('input', () => {
    state[key] = parseFloat(el.value) * factor;
    valEl.textContent = Math.round(state[key]) + suffix;
    updatePreview();
  });
}

bindRange('imgScale', 'imgScale', 'imgScaleVal', '%');
bindRange('imgOffset', 'imgOffset', 'imgOffsetVal', 'px');
bindRange('strokeWidth', 'strokeWidth', 'strokeWidthVal', 'px');
bindRange('shadowBlur', 'shadowBlur', 'shadowBlurVal', 'px');
bindRange('shadowOffset', 'shadowOffset', 'shadowOffsetVal', 'px');
bindRange('shadowAlpha', 'shadowAlpha', 'shadowAlphaVal', '%');

['pinColor','pin2Color','strokeColor','innerBgColor','shadowColor'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    state[id] = e.target.value;
    updatePreview();
  });
});

// Toggles
function bindToggle(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('click', () => {
    state[key] = !state[key];
    el.classList.toggle('on', state[key]);
    updatePreview();
  });
}
bindToggle('gradToggle', 'gradEnabled');
bindToggle('innerBgToggle', 'innerBgEnabled');
bindToggle('shadowToggle', 'shadowEnabled');

// Shape presets
document.getElementById('shapePresets').addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (!btn) return;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.shape = btn.dataset.shape;
  updatePreview();
});

// Export size
['exportW','exportH'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    state[id.replace('export','')] = parseInt(e.target.value) || 128;
    document.getElementById('dimInfo').textContent = `预览: ${PREVIEW_W}×${PREVIEW_H} | 导出: ${state.W||state.exportW}×${state.H||state.exportH}`;
  });
});

document.getElementById('exportW').addEventListener('input', e => { state.exportW = parseInt(e.target.value)||128; });
document.getElementById('exportH').addEventListener('input', e => { state.exportH = parseInt(e.target.value)||160; });

// Size badges
document.getElementById('sizeBadges').addEventListener('click', e => {
  const badge = e.target.closest('.size-badge');
  if (!badge) return;
  const w = parseInt(badge.dataset.w), h = parseInt(badge.dataset.h);
  state.exportW = w; state.exportH = h;
  document.getElementById('exportW').value = w;
  document.getElementById('exportH').value = h;
  document.querySelectorAll('.size-badge').forEach(b => b.classList.remove('active-size'));
  badge.classList.add('active-size');
});

// Upload
const uploadZone = document.getElementById('uploadZone');
const imgInput = document.getElementById('imgInput');
const filename = document.getElementById('filename');

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  filename.textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { state.userImage = img; updatePreview(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

imgInput.addEventListener('change', e => handleFile(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  handleFile(e.dataTransfer.files[0]);
});

// Preview background
document.querySelectorAll('.bg-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const wrap = document.getElementById('preview-wrap');
    const bg = btn.dataset.bg;
    if (bg === 'dark') wrap.style.background = '#111';
    else if (bg === 'light') wrap.style.background = '#f0f0f0';
    else {
      wrap.style.background = `
        linear-gradient(45deg, #aaa 25%, transparent 25%),
        linear-gradient(-45deg, #aaa 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #aaa 75%),
        linear-gradient(-45deg, transparent 75%, #aaa 75%)`;
      wrap.style.backgroundSize = '16px 16px';
      wrap.style.backgroundPosition = '0 0, 0 8px, 8px -8px, -8px 0px';
      wrap.style.backgroundColor = '#eee';
    }
    if (bg !== 'checker') { wrap.style.backgroundImage = 'none'; wrap.style.backgroundColor = bg === 'dark' ? '#111' : '#f0f0f0'; }
  });
});

// Download
document.getElementById('dlBtn').addEventListener('click', () => {
  const offscreen = document.createElement('canvas');
  drawPin(offscreen, state.exportW, state.exportH, true);

  // Add shadow in export by drawing to a bigger canvas
  const pad = Math.max(state.shadowBlur, state.shadowOffset) * 2 + 20;
  const finalCanvas = document.createElement('canvas');
  finalCanvas.width = state.exportW + pad * 2;
  finalCanvas.height = state.exportH + pad * 2;
  const fc = finalCanvas.getContext('2d');

  if (state.shadowEnabled) {
    const sc = hexToRgb(state.shadowColor);
    fc.shadowColor = `rgba(${sc.r},${sc.g},${sc.b},${state.shadowAlpha/100})`;
    fc.shadowBlur = state.shadowBlur;
    fc.shadowOffsetX = 0;
    fc.shadowOffsetY = state.shadowOffset;
  }

  // draw solid pin shape first for shadow, then clear and composite
  const pathStr = SHAPES[state.shape](state.exportW, state.exportH);
  const p2 = new Path2D(pathStr);

  fc.save();
  fc.translate(pad, pad);
  if (state.shadowEnabled) {
    const sc = hexToRgb(state.shadowColor);
    fc.shadowColor = `rgba(${sc.r},${sc.g},${sc.b},${state.shadowAlpha/100})`;
    fc.shadowBlur = state.shadowBlur;
    fc.shadowOffsetY = state.shadowOffset;
  }
  fc.fillStyle = '#000';
  fc.fill(p2);
  fc.restore();

  // Now draw actual colored pin on top
  fc.save();
  fc.shadowColor = 'transparent';
  fc.translate(pad, pad);
  fc.drawImage(offscreen, 0, 0);
  fc.restore();

  const link = document.createElement('a');
  link.download = `pin-icon-${state.exportW}x${state.exportH}.png`;
  link.href = finalCanvas.toDataURL('image/png');
  link.click();
});

// Init
document.getElementById('preview-wrap').style.background = '#111';
updatePreview();
</script>
</body>
</html>
