<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test icon-combinder</title>
</head>
<body>
  <h1>Testing icon-combinder ESM</h1>
  <div id="result"></div>
  <script type="module">
    import { renderIcon } from 'http://localhost:5173/@fs/E:/temporary-project/icon-combinder/browser.mjs';

    const resultDiv = document.getElementById('result');

    try {
      const state = {
        shape: 'pin',
        iconSize: 128,
        borderWidth: 4,
        borderColor: '#ef4444',
        bgColor: '#ffffff',
        enableShadow: true,
        shadowBlur: 10,
        shadowOffsetY: 5,
        exportSquare: true,
        exportStrategy: 'center',
        antiAliasScale: 1,
        resizeStrategy: 'smooth-high',
        contourEnhance: true,
        contourOuterGlow: 2,
        contourOuterWidth: 6,
        contourMainWidth: 3,
        contourInnerWidth: 1,
        contourCornerSoftness: 0.12,
        lineJoin: 'round',
        imageScale: 1.0,
        imageOffsetY: 0,
      };

      const source = { kind: 'url', value: 'http://localhost:5173/sample-icon.png' };

      resultDiv.innerHTML = '<p>Calling renderIcon...</p>';

      renderIcon(state, source).then(result => {
        resultDiv.innerHTML = '<p>Success!</p><img src="' + result.dataUrl + '" />';
      }).catch(err => {
        resultDiv.innerHTML = '<p style="color:red">Error: ' + err.message + '</p><pre>' + err.stack + '</pre>';
      });
    } catch (err) {
      resultDiv.innerHTML = '<p style="color:red">Fatal Error: ' + err.message + '</p><pre>' + err.stack + '</pre>';
    }
  </script>
</body>
</html>
