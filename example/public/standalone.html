<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Standalone Test</title>
</head>
<body>
  <h1>Standalone Test</h1>
  <div id="result"></div>
  <script type="module">
    // 首先检查 import.meta.url 是否可用
    document.getElementById('result').innerHTML += '<p>Browser: ' + navigator.userAgent + '</p>';

    const browserUrl = 'http://localhost:5173/@fs/E:/temporary-project/icon-combinder/browser.mjs';
    document.getElementById('result').innerHTML += '<p>Loading: ' + browserUrl + '</p>';

    import(browserUrl)
      .then(mod => {
        document.getElementById('result').innerHTML += '<p>Module loaded! renderIcon type: ' + typeof mod.renderIcon + '</p>';

        return mod.renderIcon({
          shape: 'pin',
          iconSize: 64,
          borderWidth: 2,
          borderColor: '#ef4444',
          bgColor: '#ffffff',
          enableShadow: false,
          exportSquare: true,
          exportStrategy: 'center',
          antiAliasScale: 1,
          resizeStrategy: 'smooth-high',
          contourEnhance: false,
          lineJoin: 'round',
          imageScale: 1.0,
          imageOffsetY: 0,
        }, { kind: 'url', value: 'http://localhost:5173/sample-icon.png' });
      })
      .then(result => {
        document.getElementById('result').innerHTML += '<p>Success! buffer type: ' + typeof result.dataUrl + '</p>';
        document.getElementById('result').innerHTML += '<img src="' + result.dataUrl + '" style="max-width:200px"/>';
      })
      .catch(err => {
        document.getElementById('result').innerHTML += '<pre style="color:red">Error: ' + err.message + '</pre>';
        if (err.stack) {
          document.getElementById('result').innerHTML += '<pre>' + err.stack + '</pre>';
        }
      });
  </script>
</body>
</html>
